</g>
<text x="877" y="780" fill="#2f68a2" font-size="25" font-weight="760" text-anchor="middle" letter-spacing="1.2" opacity="1">ONE DIE</text>
<path d="M1070 555H1150" fill="none" stroke="#4f5965" stroke-width="4" stroke-dasharray="7 8" marker-end="url(#arrow-ink)" opacity="0.8"/>

<g filter="url(#paper-shadow)">
  <rect x="1170" y="340" width="302" height="364" rx="18" fill="#fffaf0" stroke="#c17a1b" stroke-width="5"/>
  <path d="M1170 408H1435" stroke="#4f5965" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
<path d="M1190 456H1407" stroke="#4f5965" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
