<path d="M1190 552H1435" stroke="#c17a1b" stroke-width="14" stroke-linecap="round" opacity="0.82"/>
<path d="M1170 600H1407" stroke="#c17a1b" stroke-width="14" stroke-linecap="round" opacity="0.82"/>
<path d="M1190 648H1379" stroke="#4f5965" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
<path d="M1170 696H1435" stroke="#4f5965" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
<path d="M1190 744H1407" stroke="#4f5965" stroke-width="8" stroke-linecap="round" opacity="0.55"/>
  <circle cx="1320" cy="570" r="32" fill="none" stroke="#ad4355" stroke-width="5" stroke-dasharray="8 7"/>
</g>
<text x="1321" y="780" fill="#c17a1b" font-size="25" font-weight="760" text-anchor="middle" letter-spacing="1.2" opacity="1">METAL LINES</text>
<path d="M1493 555H1558" fill="none" stroke="#4f5965" stroke-width="4" stroke-dasharray="7 8" marker-end="url(#arrow-ink)" opacity="0.8"/>

<g filter="url(#paper-shadow)">
  <circle cx="1691" cy="522" r="146" fill="#fffaf0" stroke="#ad4355" stroke-width="5"/>
  <path d="M1566 475H1816M1566 575H1816" stroke="#c17a1b" stroke-width="34" stroke-linecap="round"/>
  <path d="M1674 473C1654 505 1728 531 1705 576" fill="none" stroke="#ad4355" stroke-width="28" stroke-linecap="round"/>
  <circle cx="1690" cy="525" r="25" fill="#ad4355" opacity="0.9"/>
</g>
<text x="1691" y="780" fill="#ad4355" font-size="25" font-weight="780" text-anchor="middle" letter-spacing="1.2" opacity="1">20 nm DEFECT</text>

<path d="M380 868H1691" stroke="#4f5965" stroke-width="3"/>
<path d="M380 850V886M1691 850V886" stroke="#4f5965" stroke-width="3"/>
<text x="1036" y="927" fill="#171a1f" font-size="42" font-weight="780" text-anchor="middle" letter-spacing="0" opacity="1">15,000,000×</text>
<text x="1036" y="966" fill="#7b827f" font-size="18" font-weight="720" text-anchor="middle" letter-spacing="2.2" opacity="1">LINEAR SCALE DIFFERENCE</text>
</svg>
