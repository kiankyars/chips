<path d="M391 342V690" stroke="#4f5965" stroke-width="1.5" opacity="0.27"/>
<path d="M435 342V690" stroke="#4f5965" stroke-width="1.5" opacity="0.27"/>
<path d="M479 342V690" stroke="#4f5965" stroke-width="1.5" opacity="0.27"/>
<path d="M523 342V690" stroke="#4f5965" stroke-width="1.5" opacity="0.27"/>
<path d="M196 360H564" stroke="#4f5965" stroke-width="1.5" opacity="0.27"/>
<path d="M196 402H564" stroke="#4f5965" stroke-width="1.5" opacity="0.27"/>
<path d="M196 444H564" stroke="#4f5965" stroke-width="1.5" opacity="0.27"/>
<path d="M196 486H564" stroke="#4f5965" stroke-width="1.5" opacity="0.27"/>
<path d="M196 528H564" stroke="#4f5965" stroke-width="1.5" opacity="0.27"/>
<path d="M196 570H564" stroke="#4f5965" stroke-width="1.5" opacity="0.27"/>
<path d="M196 612H564" stroke="#4f5965" stroke-width="1.5" opacity="0.27"/>
<path d="M196 654H564" stroke="#4f5965" stroke-width="1.5" opacity="0.27"/></g>
  <rect x="456" y="456" width="44" height="42" fill="#f3dce0" stroke="#ad4355" stroke-width="4"/>
</g>
<text x="380" y="780" fill="#4f5965" font-size="25" font-weight="760" text-anchor="middle" letter-spacing="1.2" opacity="1">300 mm WAFER</text>
<path d="M590 555H682" fill="none" stroke="#4f5965" stroke-width="4" stroke-dasharray="7 8" marker-end="url(#arrow-ink)" opacity="0.8"/>

<g filter="url(#paper-shadow)">
  <rect x="706" y="340" width="342" height="364" rx="18" fill="#dce8f3" stroke="#2f68a2" stroke-width="5"/>
  <path d="M732 390H1022M732 444H1022M732 498H1022M732 552H1022M732 606H1022M790 366V678M856 366V678M922 366V678M988 366V678" stroke="#2f68a2" stroke-width="2" opacity="0.28"/>
