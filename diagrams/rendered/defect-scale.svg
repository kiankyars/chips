<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
<title id="title">Nested zoom from a wafer to a twenty nanometre defect</title>
<desc id="desc">A four-stage zoom moves from a 300 millimetre wafer to one die, then to metal interconnect lines, and finally to a 20 nanometre particle bridging two lines. The wafer diameter is fifteen million times the defect width.</desc>
<defs>
  <pattern id="paper-grid" width="48" height="48" patternUnits="userSpaceOnUse">
    <path d="M48 0H0V48" fill="none" stroke="#ded7ca" stroke-width="1" opacity="0.22"/>
  </pattern>
  <pattern id="die-grid" width="32" height="28" patternUnits="userSpaceOnUse">
    <path d="M32 0H0V28" fill="none" stroke="#4f5965" stroke-width="1.5" opacity="0.42"/>
  </pattern>
  <filter id="paper-shadow" x="-30%" y="-30%" width="160%" height="180%">
    <feDropShadow dx="0" dy="10" stdDeviation="13" flood-color="#493f30" flood-opacity="0.12"/>
  </filter>
  <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="180%">
    <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#493f30" flood-opacity="0.14"/>
  </filter>
  <marker id="arrow-ink" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#4f5965"/>
  </marker>
  <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#16745c"/>
  </marker>
  <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#ad4355"/>
  </marker>
</defs>
<rect width="1920" height="1080" fill="#f3efe6"/>
<rect width="1920" height="1080" fill="url(#paper-grid)"/>
<text x="104" y="92" fill="#7b827f" font-size="20" font-weight="760" text-anchor="start" letter-spacing="3.6" opacity="1">INSPECTION SCALE</text>
<text x="104" y="156" fill="#171a1f" font-size="48" font-weight="760" text-anchor="start" letter-spacing="0" opacity="1">A killer defect is fifteen million times smaller than the wafer</text>
<path d="M104 190H1816" stroke="#c9c1b3" stroke-width="2"/>
<g filter="url(#paper-shadow)">
  <circle cx="380" cy="522" r="194" fill="#fffaf0" stroke="#4f5965" stroke-width="5"/>
  <clipPath id="wafer-clip"><circle cx="380" cy="522" r="188"/></clipPath>
  <g clip-path="url(#wafer-clip)"><path d="M215 342V690" stroke="#4f5965" stroke-width="1.5" opacity="0.27"/>
<path d="M259 342V690" stroke="#4f5965" stroke-width="1.5" opacity="0.27"/>
<path d="M303 342V690" stroke="#4f5965" stroke-width="1.5" opacity="0.27"/>
