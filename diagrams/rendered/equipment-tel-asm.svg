<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
<title id="title">Tokyo Electron track and ASM atomic layer deposition</title>
<desc id="desc">The left half shows a wafer moving through a Tokyo Electron coat and develop track around an ASML exposure step. The right half shows atomic layer deposition wrapping a recessed gate-all-around structure one conformal layer at a time.</desc>
<defs>
  <pattern id="paper-grid" width="48" height="48" patternUnits="userSpaceOnUse">
    <path d="M48 0H0V48" fill="none" stroke="#ded7ca" stroke-width="1" opacity="0.22"/>
  </pattern>
  <filter id="paper-shadow" x="-30%" y="-30%" width="160%" height="180%">
    <feDropShadow dx="0" dy="10" stdDeviation="13" flood-color="#493f30" flood-opacity="0.12"/>
  </filter>
  <marker id="arrow-ink" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#4f5965"/>
  </marker>
  <marker id="arrow-amber" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#c17a1b"/>
  </marker>
  <marker id="arrow-violet" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#755aa3"/>
  </marker>
</defs>
<rect width="1920" height="1080" fill="#f3efe6"/>
<rect width="1920" height="1080" fill="url(#paper-grid)"/>
<text x="104" y="92" fill="#7b827f" font-size="20" font-weight="760" text-anchor="start" letter-spacing="3.6" opacity="1">ADJACENT STEPS</text>
<text x="104" y="156" fill="#171a1f" font-size="48" font-weight="760" text-anchor="start" letter-spacing="0" opacity="1">TEL prepares the pattern; ASM coats the hidden surfaces</text>
<path d="M104 190H1816" stroke="#c9c1b3" stroke-width="2"/>
<rect x="104" y="246" width="812" height="714" rx="28" fill="#fffaf0" stroke="#c9c1b3" stroke-width="2" filter="url(#paper-shadow)"/>
<text x="150" y="308" fill="#c17a1b" font-size="23" font-weight="820" text-anchor="start" letter-spacing="1.5" opacity="1">TOKYO ELECTRON · TRACK</text>
<text x="150" y="348" fill="#7b827f" font-size="19" font-weight="760" text-anchor="start" letter-spacing="1.4" opacity="1">&gt;90% SHARE</text>
<rect x="154" y="444" width="194" height="230" rx="22" fill="#f2e2c7" stroke="#c17a1b" stroke-width="3"/>
<path d="M251 463C215 515 203 539 203 559A48 48 0 0 0 299 559C299 539 287 515 251 463Z" fill="none" stroke="#c17a1b" stroke-width="7"/><path d="M189 605H313" stroke="#c17a1b" stroke-width="9"/>
<text x="251" y="640" fill="#c17a1b" font-size="22" font-weight="820" text-anchor="middle" letter-spacing="1.6" opacity="1">COAT</text>
<rect x="414" y="444" width="194" height="230" rx="22" fill="#dce8f3" stroke="#2f68a2" stroke-width="3"/>
<rect x="453" y="483" width="116" height="80" rx="8" fill="none" stroke="#2f68a2" stroke-width="7"/><path d="M473 503H549M473 525H549M511 565V607" stroke="#2f68a2" stroke-width="5"/><path d="M479 607H543" stroke="#2f68a2" stroke-width="9"/>
<text x="511" y="640" fill="#2f68a2" font-size="22" font-weight="820" text-anchor="middle" letter-spacing="1.6" opacity="1">EXPOSE</text>
<rect x="674" y="444" width="194" height="230" rx="22" fill="#f2e2c7" stroke="#c17a1b" stroke-width="3"/>
<path d="M771 463C735 515 723 539 723 559A48 48 0 0 0 819 559C819 539 807 515 771 463Z" fill="none" stroke="#c17a1b" stroke-width="7"/><path d="M709 605H833" stroke="#c17a1b" stroke-width="9"/>
<text x="771" y="640" fill="#c17a1b" font-size="22" font-weight="820" text-anchor="middle" letter-spacing="1.2" opacity="1">DEVELOP</text>
<path d="M348 559H402M608 559H662" stroke="#4f5965" stroke-width="4" marker-end="url(#arrow-ink)"/>
<text x="251" y="724" fill="#c17a1b" font-size="24" font-weight="820" text-anchor="middle" letter-spacing="0" opacity="1">TEL</text>
<text x="511" y="724" fill="#2f68a2" font-size="24" font-weight="820" text-anchor="middle" letter-spacing="0" opacity="1">ASML</text>
<text x="771" y="724" fill="#c17a1b" font-size="24" font-weight="820" text-anchor="middle" letter-spacing="0" opacity="1">TEL</text>
<path d="M190 824H830" stroke="#c9c1b3" stroke-width="3"/>
<text x="510" y="872" fill="#4f5965" font-size="25" font-weight="620" text-anchor="middle" letter-spacing="0" opacity="1">one inline lithography cell</text>

<rect x="1004" y="246" width="812" height="714" rx="28" fill="#fffaf0" stroke="#c9c1b3" stroke-width="2" filter="url(#paper-shadow)"/>
<text x="1050" y="308" fill="#755aa3" font-size="23" font-weight="820" text-anchor="start" letter-spacing="1.5" opacity="1">ASM INTERNATIONAL · ALD</text>
<text x="1050" y="348" fill="#7b827f" font-size="19" font-weight="760" text-anchor="start" letter-spacing="1.4" opacity="1">ONE ATOMIC LAYER / CYCLE</text>
<path d="M1110 458H1712V520H1530V700H1292V520H1110Z" fill="#e6dff0" stroke="#755aa3" stroke-width="4" stroke-linejoin="round"/>
<path d="M1142 486H1680V500H1500V670H1322V500H1142Z" fill="none" stroke="#755aa3" stroke-width="16" stroke-linejoin="round" opacity="0.55"/>
<path d="M1164 512H1658M1474 522V644M1348 522V644" fill="none" stroke="#755aa3" stroke-width="10" stroke-linecap="round"/>
<rect x="1356" y="550" width="110" height="66" rx="33" fill="#d7ebe3" stroke="#16745c" stroke-width="4"/>
<text x="1411" y="592" fill="#16745c" font-size="16" font-weight="800" text-anchor="middle" letter-spacing="1.1" opacity="1">CHANNEL</text>
<path d="M1740 438C1782 500 1782 670 1710 752" fill="none" stroke="#755aa3" stroke-width="5" stroke-dasharray="10 10" marker-end="url(#arrow-violet)"/>
<text x="1620" y="794" fill="#755aa3" font-size="21" font-weight="820" text-anchor="middle" letter-spacing="1.6" opacity="1">CONFORMAL COATING</text>
<text x="1410" y="852" fill="#4f5965" font-size="26" font-weight="620" text-anchor="middle" letter-spacing="0" opacity="1">wraps every recessed surface</text>
</svg>
