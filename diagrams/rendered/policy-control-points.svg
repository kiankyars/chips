<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
<title id="title">Four policy controls act at different points in the semiconductor supply chain</title>
<desc id="desc">A horizontal supply chain marks export control points at EDA design software, foreign fab production under the foreign direct product rule, Dutch EUV export licensing, and United States imports under Section 232 tariffs.</desc>
<defs>
  <pattern id="paper-grid" width="48" height="48" patternUnits="userSpaceOnUse">
    <path d="M48 0H0V48" fill="none" stroke="#ddd5c8" stroke-width="1" opacity="0.22"/>
  </pattern>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
    <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#493f30" flood-opacity="0.13"/>
  </filter>
  <marker id="arrow-ink" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#4f5965"/>
  </marker>
  <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#3977a8"/>
  </marker>
  <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#397a66"/>
  </marker>
  <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#ad4f5d"/>
  </marker>
</defs>
<rect width="1920" height="1080" fill="#f4efe6"/>
<rect width="1920" height="1080" fill="url(#paper-grid)"/>
<text x="92" y="120" fill="#777c79" font-size="21" font-weight="780" text-anchor="start" letter-spacing="2.2" opacity="1">FOUR CONTROL POINTS</text>
<path d="M218 470L1702 470" fill="none" stroke="#4f5965" stroke-width="6" marker-end="url(#arrow-ink)"/>
<g filter="url(#shadow)">
  <rect x="92" y="365" width="370" height="210" rx="26" fill="#fffaf0" stroke="#3977a8" stroke-width="4"/>
  <rect x="92" y="365" width="370" height="18" rx="9" fill="#3977a8"/>
  <text x="277" y="447" fill="#3977a8" font-size="30" font-weight="800" text-anchor="middle" letter-spacing="1.2" opacity="1">DESIGN</text>
  <text x="277" y="496" fill="#777c79" font-size="22" font-weight="570" text-anchor="middle" letter-spacing="0" opacity="1">EDA software</text>
</g>
<g filter="url(#shadow)">
  <rect x="536" y="365" width="370" height="210" rx="26" fill="#fffaf0" stroke="#397a66" stroke-width="4"/>
  <rect x="536" y="365" width="370" height="18" rx="9" fill="#397a66"/>
  <text x="721" y="447" fill="#397a66" font-size="30" font-weight="800" text-anchor="middle" letter-spacing="1.2" opacity="1">FAB</text>
  <text x="721" y="496" fill="#777c79" font-size="22" font-weight="570" text-anchor="middle" letter-spacing="0" opacity="1">foreign production</text>
</g>
<g filter="url(#shadow)">
  <rect x="980" y="365" width="370" height="210" rx="26" fill="#fffaf0" stroke="#bd7b25" stroke-width="4"/>
  <rect x="980" y="365" width="370" height="18" rx="9" fill="#bd7b25"/>
  <text x="1165" y="447" fill="#bd7b25" font-size="30" font-weight="800" text-anchor="middle" letter-spacing="1.2" opacity="1">EQUIPMENT</text>
  <text x="1165" y="496" fill="#777c79" font-size="22" font-weight="570" text-anchor="middle" letter-spacing="0" opacity="1">EUV scanner</text>
</g>
<g filter="url(#shadow)">
  <rect x="1424" y="365" width="370" height="210" rx="26" fill="#fffaf0" stroke="#7358a3" stroke-width="4"/>
  <rect x="1424" y="365" width="370" height="18" rx="9" fill="#7358a3"/>
  <text x="1609" y="447" fill="#7358a3" font-size="30" font-weight="800" text-anchor="middle" letter-spacing="1.2" opacity="1">IMPORT</text>
  <text x="1609" y="496" fill="#777c79" font-size="22" font-weight="570" text-anchor="middle" letter-spacing="0" opacity="1">advanced chips</text>
</g>
<g>
<g>
  <circle cx="277" cy="680" r="49" fill="#fffaf0" stroke="#3977a8" stroke-width="7"/>
  <path d="M253 656L301 704M301 656L253 704" stroke="#3977a8" stroke-width="8" stroke-linecap="round"/>
</g>
<path d="M277 631L277 575" fill="none" stroke="#3977a8" stroke-width="4" stroke-dasharray="8 7"/>
<text x="277" y="786" fill="#3977a8" font-size="24" font-weight="800" text-anchor="middle" letter-spacing="1" opacity="1">US EDA CONTROL</text>
<text x="277" y="826" fill="#777c79" font-size="20" font-weight="560" text-anchor="middle" letter-spacing="0" opacity="1">license required</text>
</g>
<g>
<g>
  <circle cx="721" cy="680" r="49" fill="#fffaf0" stroke="#ad4f5d" stroke-width="7"/>
  <path d="M697 656L745 704M745 656L697 704" stroke="#ad4f5d" stroke-width="8" stroke-linecap="round"/>
</g>
<path d="M721 631L721 575" fill="none" stroke="#ad4f5d" stroke-width="4" stroke-dasharray="8 7"/>
<text x="721" y="786" fill="#ad4f5d" font-size="24" font-weight="800" text-anchor="middle" letter-spacing="1" opacity="1">FDPR</text>
<text x="721" y="826" fill="#777c79" font-size="20" font-weight="560" text-anchor="middle" letter-spacing="0" opacity="1">rule reaches TSMC</text>
</g>
<g>
<g>
  <circle cx="1165" cy="680" r="49" fill="#fffaf0" stroke="#bd7b25" stroke-width="7"/>
  <path d="M1141 656L1189 704M1189 656L1141 704" stroke="#bd7b25" stroke-width="8" stroke-linecap="round"/>
</g>
<path d="M1165 631L1165 575" fill="none" stroke="#bd7b25" stroke-width="4" stroke-dasharray="8 7"/>
<text x="1165" y="786" fill="#bd7b25" font-size="24" font-weight="800" text-anchor="middle" letter-spacing="1" opacity="1">NL EUV LICENSE</text>
<text x="1165" y="826" fill="#777c79" font-size="20" font-weight="560" text-anchor="middle" letter-spacing="0" opacity="1">shipment can be denied</text>
</g>
<g>
<g>
  <circle cx="1609" cy="680" r="49" fill="#fffaf0" stroke="#7358a3" stroke-width="7"/>
  <path d="M1585 656L1633 704M1633 656L1585 704" stroke="#7358a3" stroke-width="8" stroke-linecap="round"/>
</g>
<path d="M1609 631L1609 575" fill="none" stroke="#7358a3" stroke-width="4" stroke-dasharray="8 7"/>
<text x="1609" y="786" fill="#7358a3" font-size="24" font-weight="800" text-anchor="middle" letter-spacing="1" opacity="1">SECTION 232</text>
<text x="1609" y="826" fill="#777c79" font-size="20" font-weight="560" text-anchor="middle" letter-spacing="0" opacity="1">25% tariff</text>
</g>
<text x="960" y="972" fill="#1f272d" font-size="31" font-weight="680" text-anchor="middle" letter-spacing="0" opacity="1">Each rule acts on a different transaction.</text>
</svg>
