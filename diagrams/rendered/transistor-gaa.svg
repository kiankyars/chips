<rect x="620" y="200" width="680" height="500" rx="34" fill="url(#gate)" stroke="#60a5fa" stroke-width="4"/>
<rect x="770" y="284" width="380" height="76" rx="30" fill="#67e8f9" opacity="0.94" filter="url(#controlGlow)"/>
<rect x="788" y="302" width="344" height="40" rx="18" fill="#fbbf24"/>
