</g><g>
  <path d="M1120 164V936" stroke="#ddd6c9" stroke-width="2"/>
  <text x="1120" y="132" fill="#74746f" font-size="24" font-weight="700" text-anchor="middle" letter-spacing="0">10</text>
</g><g>
