<text x="126" y="270" fill="#3977a8" font-size="58" font-weight="820" text-anchor="start" letter-spacing="0" opacity="1">$52.7B</text>
<text x="126" y="312" fill="#777c79" font-size="20" font-weight="760" text-anchor="start" letter-spacing="1.4" opacity="1">CHIPS ACT · 2022</text>
<text x="126" y="430" fill="#397a66" font-size="58" font-weight="820" text-anchor="start" letter-spacing="0" opacity="1">+25%</text>
<text x="126" y="472" fill="#777c79" font-size="20" font-weight="760" text-anchor="start" letter-spacing="1.2" opacity="1">INVESTMENT TAX CREDIT</text>
<text x="126" y="594" fill="#7358a3" font-size="58" font-weight="820" text-anchor="start" letter-spacing="0" opacity="1">$8.9B</text>
<text x="126" y="636" fill="#777c79" font-size="20" font-weight="760" text-anchor="start" letter-spacing="1.4" opacity="1">9.9% OF INTEL</text>
<text x="126" y="684" fill="#777c79" font-size="18" font-weight="560" text-anchor="start" letter-spacing="0" opacity="1">direct federal equity · Aug 2025</text>

<rect x="490" y="96" width="1354" height="868" rx="28" fill="#fffaf0" stroke="#ddd5c8" stroke-width="3" filter="url(#shadow)"/>
