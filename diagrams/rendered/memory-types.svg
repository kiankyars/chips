<circle cx="1370" cy="411" r="5" fill="#c3842e"/>
<text x="1110" y="424" fill="#c3842e" font-size="24" font-weight="720" text-anchor="end" letter-spacing="1.1">TRAPPED CHARGE</text>
<path d="M1128 682L1438 648" fill="none" stroke="#1f272d" stroke-width="2.5"/>
<circle cx="1438" cy="648" r="5" fill="#1f272d"/>
<text x="1110" y="690" fill="#1f272d" font-size="24" font-weight="720" text-anchor="end" letter-spacing="1.1">VERTICAL CHANNEL</text>
<path d="M1062 870H1766" stroke="#ddd6c9" stroke-width="3"/>
<text x="1414" y="912" fill="#1f272d" font-size="31" font-weight="720" text-anchor="middle" letter-spacing="0">200–400+ layers</text>
<text x="1414" y="944" fill="#74746f" font-size="20" font-weight="560" text-anchor="middle" letter-spacing="0">charge remains without power</text>
</svg>
