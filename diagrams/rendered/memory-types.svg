  <path d="M338 390H430" stroke="#3977a8" stroke-width="8" stroke-linecap="round"/>
  <text x="338" y="369" fill="#3977a8" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="1.5">WORD LINE</text>
  <circle cx="608" cy="508" r="10" fill="#1f272d"/>
  <path d="M608 508H622" stroke="#1f272d" stroke-width="8"/>
  <path d="M622 412V604M690 412V604" stroke="#3977a8" stroke-width="12" stroke-linecap="round"/>
  <circle cx="624" cy="462" r="7" fill="#3977a8"/><circle cx="642" cy="482" r="7" fill="#3977a8"/><circle cx="658" cy="458" r="7" fill="#3977a8"/><circle cx="627" cy="514" r="7" fill="#3977a8"/><circle cx="653" cy="527" r="7" fill="#3977a8"/><circle cx="643" cy="556" r="7" fill="#3977a8"/>
  <path d="M716 392C806 424 818 555 732 626" fill="none" stroke="#3977a8" stroke-width="5" stroke-dasharray="12 10" marker-end="url(#arrow-blue)"/>
  <text x="782" y="508" fill="#3977a8" font-size="24" font-weight="740" text-anchor="middle" letter-spacing="0">refresh</text>
  <text x="782" y="540" fill="#3977a8" font-size="22" font-weight="620" text-anchor="middle" letter-spacing="0">~64 ms</text>
</g>
<path d="M154 746H858" stroke="#ddd6c9" stroke-width="3"/>
<text x="506" y="811" fill="#1f272d" font-size="31" font-weight="720" text-anchor="middle" letter-spacing="0">1 transistor + 1 capacitor</text>
<text x="506" y="858" fill="#74746f" font-size="24" font-weight="560" text-anchor="middle" letter-spacing="0">charge leaks · power off → empty</text>

<text x="1062" y="185" fill="#c3842e" font-size="48" font-weight="780" text-anchor="start" letter-spacing="1.2">NAND</text>
<text x="1062" y="226" fill="#74746f" font-size="20" font-weight="700" text-anchor="start" letter-spacing="2.4">NONVOLATILE STORAGE</text>
