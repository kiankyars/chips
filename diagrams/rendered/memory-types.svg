<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
<title id="title">DRAM and NAND store bits in different physical structures</title>
<desc id="desc">A DRAM cell uses one transistor and one capacitor that must be refreshed about every 64 milliseconds. A vertical NAND string traps charge across hundreds of layers and retains data without power.</desc>
<defs>
  <filter id="shadow" x="-25%" y="-25%" width="150%" height="170%">
    <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#1f272d" flood-opacity="0.13"/>
  </filter>
  <marker id="arrow-ink" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#1f272d"/>
  </marker>
  <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#3977a8"/>
  </marker>
  <marker id="arrow-violet" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#7358a3"/>
  </marker>
  <pattern id="hatch" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <path d="M0 0V18" stroke="#ad5a5a" stroke-width="5" opacity="0.36"/>
  </pattern>
</defs>
<rect width="1920" height="1080" fill="#f4efe6"/>
<rect x="96" y="104" width="820" height="850" rx="34" fill="#fbf8f1" stroke="#ddd6c9" stroke-width="3"/>
