<text x="154" y="226" fill="#74746f" font-size="20" font-weight="700" text-anchor="start" letter-spacing="2.4">VOLATILE WORKING MEMORY</text>
<g>
  <path d="M286 338V690" stroke="#1f272d" stroke-width="8" stroke-linecap="round"/>
  <text x="286" y="312" fill="#74746f" font-size="18" font-weight="700" text-anchor="middle" letter-spacing="1.5">BIT LINE</text>
  <path d="M286 508H414" stroke="#1f272d" stroke-width="8" stroke-linecap="round"/>
  <path d="M414 474V542M452 474V542" stroke="#3977a8" stroke-width="10" stroke-linecap="round"/>
  <path d="M452 508H608" stroke="#1f272d" stroke-width="8" stroke-linecap="round"/>
