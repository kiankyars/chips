<rect x="1190" y="693" width="500" height="24" rx="8" fill="#fbf8f1" stroke="#a8a49a" stroke-width="2"/>

<rect x="1190" y="735" width="500" height="24" rx="8" fill="#f1dfbd" stroke="#c3842e" stroke-width="3"/>
