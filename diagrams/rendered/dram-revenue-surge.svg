<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
<title id="title">DRAM revenue forecast rises from 165.7 billion dollars to 404.3 billion dollars</title>
<desc id="desc">Two bars compare 2025 DRAM revenue of 165.7 billion dollars with the 2026 forecast of 404.3 billion dollars, a 144 percent increase. A capacity diagram shows that one unit of HBM output uses about three times the wafer capacity per gigabyte of DDR5.</desc>
<defs>
  <pattern id="paper-grid" width="48" height="48" patternUnits="userSpaceOnUse">
    <path d="M48 0H0V48" fill="none" stroke="#ddd5c8" stroke-width="1" opacity="0.22"/>
  </pattern>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
    <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#493f30" flood-opacity="0.13"/>
  </filter>
  <marker id="arrow-ink" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#4f5965"/>
  </marker>
  <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#3977a8"/>
  </marker>
  <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#397a66"/>
  </marker>
  <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#ad4f5d"/>
  </marker>
</defs>
<rect width="1920" height="1080" fill="#f4efe6"/>
<rect width="1920" height="1080" fill="url(#paper-grid)"/>
<text x="118" y="118" fill="#777c79" font-size="21" font-weight="780" text-anchor="start" letter-spacing="2.2" opacity="1">DRAM INDUSTRY REVENUE</text>
<path d="M118 832L1080 832" fill="none" stroke="#4f5965" stroke-width="4"/>
<rect x="222" y="502" width="286" height="330" rx="20" fill="#d8e7f1" stroke="#3977a8" stroke-width="5" filter="url(#shadow)"/>
<text x="365" y="470" fill="#3977a8" font-size="48" font-weight="800" text-anchor="middle" letter-spacing="0" opacity="1">$165.7B</text>
<text x="365" y="880" fill="#777c79" font-size="27" font-weight="760" text-anchor="middle" letter-spacing="1.4" opacity="1">2025</text>
<rect x="670" y="27" width="286" height="805" rx="20" fill="#e4dcef" stroke="#7358a3" stroke-width="5" filter="url(#shadow)"/>
<text x="813" y="101" fill="#7358a3" font-size="48" font-weight="800" text-anchor="middle" letter-spacing="0" opacity="1">$404.3B</text>
<text x="813" y="880" fill="#777c79" font-size="27" font-weight="760" text-anchor="middle" letter-spacing="1.4" opacity="1">2026E</text>
<path d="M510 516C574 446 614 352 660 210" fill="none" stroke="#397a66" stroke-width="7" marker-end="url(#arrow-green)"/>
<rect x="468" y="294" width="206" height="48" rx="24" fill="#d8e8df" stroke="#397a66" stroke-width="2.5"/>
<text x="571" y="325" fill="#397a66" font-size="28" font-weight="760" text-anchor="middle" letter-spacing="0.5" opacity="1">+144%</text>

<rect x="1130" y="104" width="684" height="820" rx="28" fill="#fffaf0" stroke="#ddd5c8" stroke-width="3" filter="url(#shadow)"/>
<text x="1180" y="178" fill="#7358a3" font-size="21" font-weight="780" text-anchor="start" letter-spacing="2.2" opacity="1">CAPACITY PER GIGABYTE</text>
<text x="1472" y="241" fill="#7358a3" font-size="42" font-weight="800" text-anchor="middle" letter-spacing="0" opacity="1">HBM ≈ 3× DDR5</text>
<g>
  <ellipse cx="1325" cy="600" rx="67.08" ry="21.84" fill="#fffaf0" stroke="#7358a3" stroke-width="3.9000000000000004"/>
  <path d="M1261.04 600V617.16C1286 643.68 1364 643.68 1388.96 617.16V600" fill="#7358a3" opacity="0.15" stroke="#7358a3" stroke-width="3.12"/>
  <path d="M1282.1 592.98H1367.9M1297.7 605.46H1352.3" stroke="#7358a3" stroke-width="1.56" opacity="0.4"/>
</g>
<g>
  <ellipse cx="1495" cy="642" rx="67.08" ry="21.84" fill="#fffaf0" stroke="#7358a3" stroke-width="3.9000000000000004"/>
  <path d="M1431.04 642V659.16C1456 685.68 1534 685.68 1558.96 659.16V642" fill="#7358a3" opacity="0.15" stroke="#7358a3" stroke-width="3.12"/>
  <path d="M1452.1 634.98H1537.9M1467.7 647.46H1522.3" stroke="#7358a3" stroke-width="1.56" opacity="0.4"/>
</g>
<g>
  <ellipse cx="1665" cy="684" rx="67.08" ry="21.84" fill="#fffaf0" stroke="#7358a3" stroke-width="3.9000000000000004"/>
  <path d="M1601.04 684V701.16C1626 727.68 1704 727.68 1728.96 701.16V684" fill="#7358a3" opacity="0.15" stroke="#7358a3" stroke-width="3.12"/>
  <path d="M1622.1 676.98H1707.9M1637.7 689.46H1692.3" stroke="#7358a3" stroke-width="1.56" opacity="0.4"/>
</g>
<text x="1470" y="782" fill="#7358a3" font-size="24" font-weight="780" text-anchor="middle" letter-spacing="1.8" opacity="1">ONE HBM WAFER</text>
<text x="1470" y="824" fill="#777c79" font-size="23" font-weight="560" text-anchor="middle" letter-spacing="0" opacity="1">uses capacity equivalent to roughly</text>
<text x="1470" y="865" fill="#1f272d" font-size="25" font-weight="780" text-anchor="middle" letter-spacing="1.5" opacity="1">THREE PC-DRAM WAFERS</text>
<text x="118" y="1000" fill="#777c79" font-size="22" font-weight="560" text-anchor="start" letter-spacing="0" opacity="1">Forecast · data centers account for about 70% of 2026 memory output</text>
</svg>
