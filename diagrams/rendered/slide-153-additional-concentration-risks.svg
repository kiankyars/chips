<path d="M104 190H1816" stroke="#cec6b9" stroke-width="2"/>
<rect x="1616" y="86" width="184" height="48" rx="24" fill="#f1dadd" stroke="#b24956" stroke-width="2"/>
<text x="1708" y="118" fill="#b24956" font-size="19" font-weight="780" text-anchor="middle" letter-spacing="0.8" opacity="1">3 MORE</text>
