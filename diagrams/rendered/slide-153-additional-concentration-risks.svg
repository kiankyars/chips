<text x="1550" y="688" fill="#705a96" font-size="68" font-weight="860" text-anchor="middle" letter-spacing="0" opacity="1">&gt;80%</text>
<text x="1550" y="736" fill="#20252b" font-size="23" font-weight="800" text-anchor="middle" letter-spacing="0" opacity="1">ADVANTEST + TERADYNE</text>
