<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
<title id="title">High-bandwidth memory beside a GPU on a silicon interposer</title>
<desc id="desc">An exploded axonometric package shows eight representative DRAM dies joined by through-silicon vias and microbumps above a logic base die. A wide interface crosses the silicon interposer to the GPU.</desc>
