  <text x="886.48" y="906.92" fill="#3977a8" font-size="16.56" font-weight="800" text-anchor="middle" letter-spacing="1" opacity="1">H20</text>
</g>
<path d="M980 903L1125 903" fill="none" stroke="#3977a8" stroke-width="5" marker-end="url(#arrow-blue)"/>
