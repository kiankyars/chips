<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
<title id="title">Policy repeatedly opened and closed the market for Nvidia China chips</title>
<desc id="desc">Five policy gates track the H20 and H200 from October 2023 to January 2026: the H20 is created after the H800 exception closes, receives a license requirement in April 2025, briefly reopens with a revenue share, stops production after Chinese discouragement, and is followed by case by case H200 licensing with a tariff.</desc>
<defs>
  <pattern id="paper-grid" width="48" height="48" patternUnits="userSpaceOnUse">
    <path d="M48 0H0V48" fill="none" stroke="#ddd5c8" stroke-width="1" opacity="0.22"/>
  </pattern>
  <filter id="shadow" x="-30%" y="-30%" width="160%" height="180%">
    <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#493f30" flood-opacity="0.13"/>
  </filter>
  <marker id="arrow-ink" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#4f5965"/>
  </marker>
  <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#3977a8"/>
  </marker>
  <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#397a66"/>
  </marker>
  <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#ad4f5d"/>
  </marker>
</defs>
<rect width="1920" height="1080" fill="#f4efe6"/>
<rect width="1920" height="1080" fill="url(#paper-grid)"/>
<text x="92" y="110" fill="#777c79" font-size="21" font-weight="780" text-anchor="start" letter-spacing="2.2" opacity="1">ACCESS TO CHINA</text>
<path d="M160 520L1760 520" fill="none" stroke="#4f5965" stroke-width="5" marker-end="url(#arrow-ink)"/>
<g>
<text x="230" y="216" fill="#777c79" font-size="20" font-weight="800" text-anchor="middle" letter-spacing="1.3" opacity="1">OCT 2023</text>
<g>
  <rect x="85" y="384" width="290" height="272" rx="28" fill="#d8e8df" stroke="#397a66" stroke-width="3"/>
  <g>
  <path d="M184 412V560M276 340V488" stroke="#397a66" stroke-width="8" stroke-linecap="round"/>
  <path d="M170 412H290" stroke="#397a66" stroke-width="8" stroke-linecap="round"/>
  <circle cx="230" cy="474" r="20" fill="#fffaf0" stroke="#397a66" stroke-width="5"/>
  <path d="M220 474L229 484L246 462" fill="none" stroke="#397a66" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</g>
  <text x="230" y="594" fill="#397a66" font-size="22" font-weight="800" text-anchor="middle" letter-spacing="1" opacity="1">H20 CREATED</text>
  <text x="230" y="628" fill="#777c79" font-size="18" font-weight="560" text-anchor="middle" letter-spacing="0" opacity="1">H800 exception closes</text>
</g>
</g>
<g>
<text x="590" y="216" fill="#777c79" font-size="20" font-weight="800" text-anchor="middle" letter-spacing="1.3" opacity="1">APR 2025</text>
<g>
  <rect x="445" y="384" width="290" height="272" rx="28" fill="#efd9dc" stroke="#ad4f5d" stroke-width="3"/>
  <g>
  <path d="M544 412V560M636 412V560" stroke="#ad4f5d" stroke-width="8" stroke-linecap="round"/>
  <path d="M530 412H650" stroke="#ad4f5d" stroke-width="8" stroke-linecap="round"/>
  <circle cx="590" cy="474" r="20" fill="#fffaf0" stroke="#ad4f5d" stroke-width="5"/>
  <path d="M580 474L589 484L606 462" fill="none" stroke="#ad4f5d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</g>
  <text x="590" y="594" fill="#ad4f5d" font-size="22" font-weight="800" text-anchor="middle" letter-spacing="1" opacity="1">LICENSED</text>
  <text x="590" y="628" fill="#777c79" font-size="18" font-weight="560" text-anchor="middle" letter-spacing="0" opacity="1">$4.5B charge</text>
</g>
</g>
<g>
<text x="950" y="216" fill="#777c79" font-size="20" font-weight="800" text-anchor="middle" letter-spacing="1.3" opacity="1">JUL–AUG 2025</text>
<g>
  <rect x="805" y="384" width="290" height="272" rx="28" fill="#f1dfbd" stroke="#bd7b25" stroke-width="3"/>
  <g>
  <path d="M904 412V560M996 340V488" stroke="#bd7b25" stroke-width="8" stroke-linecap="round"/>
  <path d="M890 412H1010" stroke="#bd7b25" stroke-width="8" stroke-linecap="round"/>
