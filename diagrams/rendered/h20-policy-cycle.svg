  <path d="M940 474L949 484L966 462" fill="none" stroke="#bd7b25" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</g>
  <text x="950" y="594" fill="#bd7b25" font-size="22" font-weight="800" text-anchor="middle" letter-spacing="1" opacity="1">REOPENED</text>
  <text x="950" y="628" fill="#777c79" font-size="18" font-weight="560" text-anchor="middle" letter-spacing="0" opacity="1">15% revenue share</text>
</g>
</g>
<g>
<text x="1310" y="216" fill="#777c79" font-size="20" font-weight="800" text-anchor="middle" letter-spacing="1.3" opacity="1">AUG 2025</text>
<g>
  <rect x="1165" y="384" width="290" height="272" rx="28" fill="#efd9dc" stroke="#ad4f5d" stroke-width="3"/>
  <g>
  <path d="M1264 412V560M1356 412V560" stroke="#ad4f5d" stroke-width="8" stroke-linecap="round"/>
  <path d="M1250 412H1370" stroke="#ad4f5d" stroke-width="8" stroke-linecap="round"/>
  <circle cx="1310" cy="474" r="20" fill="#fffaf0" stroke="#ad4f5d" stroke-width="5"/>
  <path d="M1300 474L1309 484L1326 462" fill="none" stroke="#ad4f5d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</g>
  <text x="1310" y="594" fill="#ad4f5d" font-size="22" font-weight="800" text-anchor="middle" letter-spacing="1" opacity="1">PRODUCTION STOPS</text>
  <text x="1310" y="628" fill="#777c79" font-size="18" font-weight="560" text-anchor="middle" letter-spacing="0" opacity="1">China discourages sales</text>
</g>
</g>
<g>
<text x="1670" y="216" fill="#777c79" font-size="20" font-weight="800" text-anchor="middle" letter-spacing="1.3" opacity="1">JAN 2026</text>
<g>
  <rect x="1525" y="384" width="290" height="272" rx="28" fill="#f1dfbd" stroke="#bd7b25" stroke-width="3"/>
  <g>
  <path d="M1624 412V560M1716 340V488" stroke="#bd7b25" stroke-width="8" stroke-linecap="round"/>
  <path d="M1610 412H1730" stroke="#bd7b25" stroke-width="8" stroke-linecap="round"/>
  <circle cx="1670" cy="474" r="20" fill="#fffaf0" stroke="#bd7b25" stroke-width="5"/>
  <path d="M1660 474L1669 484L1686 462" fill="none" stroke="#bd7b25" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</g>
  <text x="1670" y="594" fill="#bd7b25" font-size="22" font-weight="800" text-anchor="middle" letter-spacing="1" opacity="1">H200 CASE-BY-CASE</text>
  <text x="1670" y="628" fill="#777c79" font-size="18" font-weight="560" text-anchor="middle" letter-spacing="0" opacity="1">25% tariff</text>
</g>
</g>
<g>
