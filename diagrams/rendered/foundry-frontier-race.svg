<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-labelledby="title desc" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
<title id="title">Four paths at the leading edge</title>
<desc id="desc">A four-lane timeline shows Samsung continuing at the frontier despite a yield warning, GlobalFoundries ending its seven nanometre program in 2018, Rapidus beginning a state-backed two nanometre effort, and SMIC reaching seven nanometres without EUV.</desc>
<defs>
  <pattern id="paper-grid" width="48" height="48" patternUnits="userSpaceOnUse">
    <path d="M48 0H0V48" fill="none" stroke="#ded7ca" stroke-width="1" opacity="0.22"/>
  </pattern>
  <pattern id="die-grid" width="32" height="28" patternUnits="userSpaceOnUse">
    <path d="M32 0H0V28" fill="none" stroke="#4f5965" stroke-width="1.5" opacity="0.42"/>
  </pattern>
  <filter id="paper-shadow" x="-30%" y="-30%" width="160%" height="180%">
    <feDropShadow dx="0" dy="10" stdDeviation="13" flood-color="#493f30" flood-opacity="0.12"/>
  </filter>
  <filter id="soft-shadow" x="-30%" y="-30%" width="160%" height="180%">
    <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#493f30" flood-opacity="0.14"/>
  </filter>
  <marker id="arrow-ink" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#4f5965"/>
  </marker>
  <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#16745c"/>
  </marker>
  <marker id="arrow-red" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
    <path d="M0 0L12 6L0 12Z" fill="#ad4355"/>
  </marker>
</defs>
<rect width="1920" height="1080" fill="#f3efe6"/>
<rect width="1920" height="1080" fill="url(#paper-grid)"/>
<text x="104" y="92" fill="#7b827f" font-size="20" font-weight="760" text-anchor="start" letter-spacing="3.6" opacity="1">FOUNDRIES</text>
<text x="104" y="156" fill="#171a1f" font-size="48" font-weight="760" text-anchor="start" letter-spacing="0" opacity="1">Four paths at the frontier</text>
<path d="M104 190H1816" stroke="#c9c1b3" stroke-width="2"/>
<path d="M390 250L390 970" fill="none" stroke="#c9c1b3" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 10" opacity="1"/>
<text x="390" y="235" fill="#7b827f" font-size="21" font-weight="690" text-anchor="middle" letter-spacing="0" opacity="1">2018</text>
<path d="M710 250L710 970" fill="none" stroke="#c9c1b3" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 10" opacity="1"/>
<text x="710" y="235" fill="#7b827f" font-size="21" font-weight="690" text-anchor="middle" letter-spacing="0" opacity="1">2022</text>
<path d="M1030 250L1030 970" fill="none" stroke="#c9c1b3" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 10" opacity="1"/>
<text x="1030" y="235" fill="#7b827f" font-size="21" font-weight="690" text-anchor="middle" letter-spacing="0" opacity="1">2023</text>
<path d="M1370 250L1370 970" fill="none" stroke="#c9c1b3" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 10" opacity="1"/>
<text x="1370" y="235" fill="#7b827f" font-size="21" font-weight="690" text-anchor="middle" letter-spacing="0" opacity="1">2025</text>
<path d="M1750 250L1750 970" fill="none" stroke="#c9c1b3" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 10" opacity="1"/>
<text x="1750" y="235" fill="#7b827f" font-size="21" font-weight="690" text-anchor="middle" letter-spacing="0" opacity="1">2027</text>
<text x="118" y="359" fill="#16745c" font-size="27" font-weight="760" text-anchor="start" letter-spacing="0" opacity="1">SAMSUNG</text>
<path d="M390 350L1750 350" fill="none" stroke="#c9c1b3" stroke-width="4" stroke-linecap="round" opacity="1"/>
<path d="M390 350L1722 350" fill="none" stroke="#16745c" stroke-width="8" stroke-linecap="round" marker-end="url(#arrow-green)" opacity="1"/>
<circle cx="710" cy="350" r="11" fill="#16745c"/>
<rect x="634" y="384" width="152" height="48" rx="24" fill="#d7ebe3" stroke="#16745c" stroke-width="2"/>
<text x="710" y="416" fill="#16745c" font-size="20" font-weight="760" text-anchor="middle" letter-spacing="0.5" opacity="1">3 nm GAA</text>
<path d="M1030 322.1L1061 377.9H999Z" fill="#f2e2c7" stroke="#c17a1b" stroke-width="3" stroke-linejoin="round"/>
<text x="1030" y="367" fill="#c17a1b" font-size="31" font-weight="850" text-anchor="middle" letter-spacing="0" opacity="1">!</text>
<text x="1030" y="423" fill="#c17a1b" font-size="18" font-weight="780" text-anchor="middle" letter-spacing="1.4" opacity="1">YIELD</text>

<text x="78" y="544" fill="#4f5965" font-size="24" font-weight="760" text-anchor="start" letter-spacing="0" opacity="1">GLOBALFOUNDRIES</text>
<path d="M390 535L1750 535" fill="none" stroke="#c9c1b3" stroke-width="4" stroke-linecap="round" opacity="1"/>
<path d="M366 508L414 556M414 508L366 556" stroke="#ad4355" stroke-width="9" stroke-linecap="round"/>
<rect x="425" y="511" width="184" height="48" rx="24" fill="#f3dce0" stroke="#ad4355" stroke-width="2"/>
<text x="517" y="543" fill="#ad4355" font-size="20" font-weight="760" text-anchor="middle" letter-spacing="0.5" opacity="1">7 nm EXIT</text>

<text x="118" y="729" fill="#2f68a2" font-size="27" font-weight="760" text-anchor="start" letter-spacing="0" opacity="1">RAPIDUS</text>
<path d="M390 720L1750 720" fill="none" stroke="#c9c1b3" stroke-width="4" stroke-linecap="round" opacity="1"/>
<g fill="none" stroke="#2f68a2" stroke-width="2.46" stroke-linejoin="round">
  <path d="M1165 666L1208.46 638.12L1251.92 666Z" fill="#dce8f3"/>
  <path d="M1171.56 669.28H1245.3600000000001M1178.12 723.4H1238.8000000000002"/>
  <path d="M1185.5 672.56V720.12M1208.46 672.56V720.12M1231.42 672.56V720.12"/>
</g>
<path d="M1275 720L1370 720" fill="none" stroke="#2f68a2" stroke-width="8" stroke-linecap="round" opacity="1"/>
<circle cx="1370" cy="720" r="13" fill="#2f68a2"/>
<path d="M1370 720L1722 720" fill="none" stroke="#2f68a2" stroke-width="6" stroke-linecap="round" stroke-dasharray="15 13" marker-end="url(#arrow-ink)" opacity="1"/>
<rect x="1296" y="754" width="178" height="48" rx="24" fill="#dce8f3" stroke="#2f68a2" stroke-width="2"/>
<text x="1385" y="786" fill="#2f68a2" font-size="20" font-weight="760" text-anchor="middle" letter-spacing="0.5" opacity="1">2 nm PILOT</text>
<text x="1750" y="785" fill="#7b827f" font-size="18" font-weight="760" text-anchor="middle" letter-spacing="1.5" opacity="1">TARGET</text>

<text x="118" y="914" fill="#c17a1b" font-size="27" font-weight="760" text-anchor="start" letter-spacing="0" opacity="1">SMIC</text>
<path d="M390 905L1750 905" fill="none" stroke="#c9c1b3" stroke-width="4" stroke-linecap="round" opacity="1"/>
<path d="M815 905L1030 905" fill="none" stroke="#c17a1b" stroke-width="8" stroke-linecap="round" opacity="1"/>
<circle cx="1030" cy="905" r="13" fill="#c17a1b"/>
<g transform="translate(1060 861)">
  <rect x="0" y="0" width="58" height="58" rx="8" fill="none" stroke="#c17a1b" stroke-width="3"/>
  <rect x="13" y="13" width="58" height="58" rx="8" fill="none" stroke="#c17a1b" stroke-width="3" opacity="0.72"/>
  <rect x="26" y="26" width="58" height="58" rx="8" fill="none" stroke="#c17a1b" stroke-width="3" opacity="0.44"/>
</g>
<rect x="1166" y="881" width="220" height="48" rx="24" fill="#f2e2c7" stroke="#c17a1b" stroke-width="2"/>
<text x="1276" y="913" fill="#c17a1b" font-size="20" font-weight="760" text-anchor="middle" letter-spacing="0.5" opacity="1">7 nm · NO EUV</text>
<text x="1816" y="1014" fill="#7b827f" font-size="19" font-weight="730" text-anchor="end" letter-spacing="2" opacity="1">TIME →</text>
</svg>
