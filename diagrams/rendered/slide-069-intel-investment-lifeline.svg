</g>
<text x="1782" y="467" fill="#2f7b65" font-size="21" font-weight="820" text-anchor="end" letter-spacing="1.4" opacity="1">NVIDIA</text>
<text x="1782" y="527" fill="#2f7b65" font-size="46" font-weight="850" text-anchor="end" letter-spacing="0" opacity="1">$5B</text>
<text x="1782" y="575" fill="#747a76" font-size="18" font-weight="680" text-anchor="end" letter-spacing="0" opacity="1">equity + joint products</text>
