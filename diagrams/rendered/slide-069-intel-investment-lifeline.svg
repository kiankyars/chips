<text x="993" y="689" fill="#705a96" font-size="22" font-weight="820" text-anchor="middle" letter-spacing="0.8" opacity="1">14A · HIGH-NA EUV</text>

<rect x="1328" y="686" width="488" height="172" rx="24" fill="#f1dadd" stroke="#b24956" stroke-width="3" stroke-dasharray="10 8"/>
