<text x="500" y="612" fill="#b87821" font-size="21" font-weight="820" text-anchor="end" letter-spacing="1.4" opacity="1">SOFTBANK</text>
<text x="500" y="672" fill="#b87821" font-size="46" font-weight="850" text-anchor="end" letter-spacing="0" opacity="1">$2B</text>
<text x="500" y="720" fill="#747a76" font-size="18" font-weight="680" text-anchor="end" letter-spacing="0" opacity="1">equity</text>
</g>
