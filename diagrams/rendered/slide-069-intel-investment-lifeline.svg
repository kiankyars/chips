<text x="500" y="382" fill="#2f6f9f" font-size="46" font-weight="850" text-anchor="end" letter-spacing="0" opacity="1">$8.9B</text>
<text x="500" y="430" fill="#747a76" font-size="18" font-weight="680" text-anchor="end" letter-spacing="0" opacity="1">9.9% stake</text>
</g>
<g>
